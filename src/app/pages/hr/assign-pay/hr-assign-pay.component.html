<div class="page">
  <div class="page-header">
    <div>
      <h1 class="page-title">Assign Pay Structure</h1>
    </div>
  </div>

  <div class="card assign-card">
    <h3 class="section-title">New Assignment</h3>

    <ng-container *ngIf="loadingData">
      <app-skeleton height="40px"></app-skeleton>
      <app-skeleton height="40px" style="margin-top:12px"></app-skeleton>
      <app-skeleton height="40px" style="margin-top:12px" width="120px"></app-skeleton>
    </ng-container>

    <div class="assign-form" *ngIf="!loadingData">
      <div class="form-group">
        <label>Employee</label>
        <select [(ngModel)]="selectedEmpId">
          <option value="">Select employee...</option>
          <option *ngFor="let emp of employees" [value]="emp.empId">
            {{ emp.firstName }} {{ emp.lastName }} &mdash; {{ emp.email }}
          </option>
        </select>
      </div>

      <div class="form-group btn-group">
        <label>&nbsp;</label>
        <button class="btn-primary" (click)="assign()" [disabled]="loading">
          {{ loading ? 'Assigning...' : 'Assign' }}
        </button>
      </div>
    </div>

    <div class="msg-banner"
      *ngIf="msg"
      [class.success]="msgType === 'success'"
      [class.error]="msgType === 'error'">
      {{ msg }}
    </div>
  </div>

  <!-- Existing Assignments -->
  <div class="card" *ngIf="assignments.length > 0">
    <div class="card-header">
      <span class="card-title">Current PayStructure</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Employee</th>
            <th>Assignment ID</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let a of assignments">
            <td class="name-cell">{{ empName(a.empId) }}</td>
            <td class="muted mono">{{ a.empPayStructId.slice(0, 12) }}...</td>
            <td>
              <button class="btn-danger-sm" (click)="deleteAssignment(a.empPayStructId)">
                Remove
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
