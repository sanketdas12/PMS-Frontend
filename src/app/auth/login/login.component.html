<div class="login-container">
  <div class="login-card">

    <!-- Logo -->
    <div class="login-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M12 11a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M5 19.5a7 7 0 0 1 14 0" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="logo-text">
        <span class="logo-name">PayrollPro</span>
        <span class="logo-sub">Employee & HR Portal</span>
      </div>
    </div>

    <h2 class="card-title">Welcome back</h2>

    <div class="input-field">
      <label>Email</label>
      <input type="email" placeholder="you@company.com" [(ngModel)]="email" (keyup.enter)="login()" />
    </div>

    <div class="input-field">
      <label>Password</label>
      <div class="password-wrap">
        <input [type]="showPassword ? 'text' : 'password'" placeholder="••••••••" [(ngModel)]="password" (keyup.enter)="login()" />
        <button type="button" class="eye-btn" (click)="showPassword = !showPassword">
          {{ showPassword ? 'Hide' : 'Show' }}
        </button>
      </div>
    </div>

    <div class="login-actions">
      <button type="button" class="forgot-link" (click)="forgotPassword()">
        Forgot password?
      </button>
    </div>

    <button class="login-btn" (click)="login()" [disabled]="loading">
      <span *ngIf="!loading">Sign in</span>
      <span *ngIf="loading" class="spinner"></span>
    </button>

    <p class="error" *ngIf="errorMsg">{{ errorMsg }}</p>
    <p class="helper-note" *ngIf="helperMsg">{{ helperMsg }}</p>
  </div>
</div>
