<header class="navbar">
  <div class="nav-brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M4 18L12 6l8 12" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M7 18h10" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div>
      <span class="brand-name">PayrollPro</span>
      <span class="brand-tag">Employee Portal</span>
    </div>
  </div>

  <nav class="nav-links">
    <a *ngFor="let item of navItems" class="nav-link" [routerLink]="item.path" routerLinkActive="active">
      {{ item.label }}
    </a>
  </nav>

  <div class="nav-right">
    <div class="profile">
      <div class="avatar" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path d="M12 11a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"/>
          <path d="M5 19.5a7 7 0 0 1 14 0"/>
        </svg>
      </div>
      <div class="profile-info">
        <span class="profile-name">{{ name }}</span>
        <span class="profile-email">{{ email }}</span>
      </div>
    </div>
    <button class="logout-btn" (click)="logout()">Log out</button>
  </div>
</header>
